name: Droid · Fix from Issue

# Phase 2 engine: an opened issue -> Droid (headless on toaster1) investigates,
# fixes, adds a regression test, and opens a linked PR for human review.

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to fix (manual re-run for iteration)"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: droid-fix-issue-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  fix:
    # Security gate (public repo): only the owner's issues run code on our box.
    # workflow_dispatch is already limited to users with write access.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.issue.author_association == 'OWNER' }}
    runs-on: [self-hosted, toaster1]
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
      REPO: ${{ github.repository }}
      # Prefer a PAT so the opened PR triggers downstream CI + review workflows.
      # Falls back to GITHUB_TOKEN (PR opens, but downstream workflows won't auto-fire).
      GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT for git auth so push + PR are attributed to a real user
          # (app/GITHUB_TOKEN actions don't trigger downstream CI/review workflows).
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Ensure Droid CLI on PATH
        run: |
          command -v droid >/dev/null 2>&1 || curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Acknowledge on the issue (non-fatal)
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "$(jq -n '{body:"🤖 Droid (headless on toaster1) picked this up — investigating and will open a PR."}')" \
            >/dev/null || echo "::warning::could not post acknowledgement comment (continuing)"

      - name: Create fix branch
        run: |
          git config user.name "factory-droid[bot]"
          git config user.email "138933559+factory-droid[bot]@users.noreply.github.com"
          git branch -D "droid/issue-${ISSUE_NUMBER}" 2>/dev/null || true
          git switch -c "droid/issue-${ISSUE_NUMBER}"

      - name: Build prompt from the issue
        run: |
          curl -sS -H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}" \
            | jq -r '"Issue #'"$ISSUE_NUMBER"': " + .title + "\n\n" + (.body // "")' > "$RUNNER_TEMP/issue.txt"
          {
            echo "Resolve the GitHub issue described below."
            echo ""
            echo "Investigate the codebase, find the ROOT CAUSE, and fix it. Add a regression"
            echo "test that fails before your fix and passes after. Follow AGENTS.md (conventions,"
            echo "SSRF hygiene, no debug mode, and the Definition of Done). Run the test suite to"
            echo "confirm it is green. Keep it a single, minimal, reviewable change. Do NOT commit,"
            echo "push, or open a pull request — only edit files."
            echo ""
            echo "----- ISSUE -----"
            cat "$RUNNER_TEMP/issue.txt"
          } > "$RUNNER_TEMP/prompt.txt"
          echo "----- prompt -----"; cat "$RUNNER_TEMP/prompt.txt"

      - name: Droid fixes the issue (headless)
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: |
          python3 -m venv "$HOME/.venv-pw" || true
          source "$HOME/.venv-pw/bin/activate"
          pip install -q --upgrade pip
          pip install -q -r requirements.txt
          [ -f requirements-dev.txt ] && pip install -q -r requirements-dev.txt || true
          pip install -q flake8
          export SECRET_KEY=demo
          droid exec --auto high -m claude-opus-4-8 -f "$RUNNER_TEMP/prompt.txt"

      - name: Commit, push, open PR
        run: |
          api="https://api.github.com"
          auth=(-H "Authorization: token ${GH_TOKEN}" -H "Accept: application/vnd.github+json")
          if git diff --quiet && git diff --cached --quiet; then
            curl -sS -X POST "${auth[@]}" "${api}/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
              -d "$(jq -n '{body:"⚠️ Droid produced no changes — needs a human."}')" >/dev/null || true
            exit 1
          fi
          git add -A
          git commit -m "fix: resolve #${ISSUE_NUMBER}

          Co-authored-by: factory-droid[bot] <138933559+factory-droid[bot]@users.noreply.github.com>"
          git push -u origin "droid/issue-${ISSUE_NUMBER}" --force
          OWNER="${REPO%%/*}"
          TITLE="$(curl -sS "${auth[@]}" "${api}/repos/${REPO}/issues/${ISSUE_NUMBER}" | jq -r '.title')"
          BODY="$(printf 'Fixes #%s\n\nAutomated fix by Droid running headless on toaster1, following AGENTS.md. Please review.' "$ISSUE_NUMBER")"
          PR_RESP="$(curl -sS -X POST "${auth[@]}" "${api}/repos/${REPO}/pulls" \
            -d "$(jq -n --arg t "Fix: $TITLE" --arg h "droid/issue-${ISSUE_NUMBER}" --arg b "main" --arg body "$BODY" \
                 '{title:$t, head:$h, base:$b, body:$body}')")"
          PR_URL="$(echo "$PR_RESP" | jq -r '.html_url // empty')"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(curl -sS "${auth[@]}" "${api}/repos/${REPO}/pulls?head=${OWNER}:droid/issue-${ISSUE_NUMBER}&state=open" | jq -r '.[0].html_url // empty')"
          fi
          curl -sS -X POST "${auth[@]}" "${api}/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "$(jq -n --arg body "✅ Opened $PR_URL" '{body:$body}')" >/dev/null || echo "::warning::could not post PR link comment"
          echo "PR: $PR_URL"
