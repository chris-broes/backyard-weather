# Image: build and push before applying.
#   docker build -t REGION-docker.pkg.dev/PROJECT_ID/ledgerline/ledger:latest .
#   docker push REGION-docker.pkg.dev/PROJECT_ID/ledgerline/ledger:latest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger
  namespace: ledgerline
  labels:
    app: ledger
spec:
  replicas: 1  # SQLite PVC is ReadWriteOnce; scale via Cloud SQL for multi-replica
  selector:
    matchLabels:
      app: ledger
  template:
    metadata:
      labels:
        app: ledger
    spec:
      containers:
        - name: ledger
          image: REGION-docker.pkg.dev/PROJECT_ID/ledgerline/ledger:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ledgerline-config
            - secretRef:
                name: ledgerline-secrets
          volumeMounts:
            - name: db-storage
              mountPath: /app/instance
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: ledger-db-pvc
