# DO NOT commit real values. Populate before applying:
#
#   kubectl create secret generic ledgerline-secrets \
#     --namespace=ledgerline \
#     --from-literal=SECRET_KEY='<your-secret-key>' \
#     --from-literal=DATABASE_URL='postgresql://user:pass@/ledgerline?host=/cloudsql/PROJECT:REGION:INSTANCE'
#
# Or store in Google Secret Manager and sync via External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: ledgerline-secrets
  namespace: ledgerline
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_ME"
  # Omit DATABASE_URL to use SQLite backed by the PVC (demo only).
  # Set to a Cloud SQL PostgreSQL URL for production.
  # DATABASE_URL: "postgresql://..."
