# Image: build and push before applying.
#   docker build -t REGION-docker.pkg.dev/PROJECT_ID/ledgerline/reminders:latest ./reminders
#   docker push REGION-docker.pkg.dev/PROJECT_ID/ledgerline/reminders:latest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reminders
  namespace: ledgerline
  labels:
    app: reminders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reminders
  template:
    metadata:
      labels:
        app: reminders
    spec:
      containers:
        - name: reminders
          image: REGION-docker.pkg.dev/PROJECT_ID/ledgerline/reminders:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
